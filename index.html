<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>STUDIO MOD</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

html{
scroll-behavior:smooth;
}

body{

background:#0f1115;

background-image:
linear-gradient(180deg,#161b22,#0f1115);

color:#fff;

}

.container{

max-width:500px;

margin:auto;

padding:18px;

}

.header{

text-align:center;

animation:show .7s;

}

.avatar{

width:120px;

height:120px;

border-radius:50%;

object-fit:cover;

border:4px solid #00d9ff;

box-shadow:0 0 18px #00d9ff;

transition:.3s;

}

.avatar:hover{

transform:scale(1.05);

}

.name{

font-size:30px;

font-weight:700;

margin-top:15px;

}

.bio{

opacity:.8;

margin-top:5px;

font-size:15px;

}

.notice{

margin-top:25px;

padding:16px;

background:#1a1f29;

border-radius:18px;

border:1px solid #2d3440;

}

.notice h2{

font-size:20px;

margin-bottom:10px;

color:#00d9ff;

}

.notice p{

margin-top:7px;

font-size:14px;

}

.search{

margin-top:22px;

}

.search input{

width:100%;

padding:14px;

background:#1b2028;

color:white;

border:none;

border-radius:14px;

outline:none;

font-size:15px;

transition:.3s;

}

.search input:focus{

box-shadow:0 0 15px #00d9ff;

}

.mod{

margin-top:22px;

background:#1a1f29;

border-radius:18px;

overflow:hidden;

border:1px solid #2f3745;

box-shadow:0 8px 18px rgba(0,0,0,.25);

transition:.3s;

}

.mod:hover{

transform:translateY(-2px);

}

.banner{

width:100%;

aspect-ratio:16/9;

object-fit:cover;

display:block;

cursor:pointer;

}

.mod-title{

padding:15px;

font-size:20px;

font-weight:600;

}

.mod-content{

display:none;

padding:15px;

animation:show .3s;

}

.sub{

background:#252d38;

border-radius:15px;

overflow:hidden;

margin-bottom:15px;

}

.sub img{

width:100%;

aspect-ratio:16/9;

object-fit:cover;

display:block;

}

.sub-name{

padding:12px;

font-size:18px;

font-weight:600;

}

.links{

display:flex;

gap:10px;

padding:0 12px 12px;

}

.links a{

flex:1;

text-align:center;

padding:11px;

border-radius:10px;

color:white;

text-decoration:none;

font-weight:600;

}

.normal{

background:#00b050;

}

.max{

background:#ff3131;

}

@keyframes show{

from{

opacity:0;

transform:translateY(20px);

}

to{

opacity:1;

transform:translateY(0);

}

}

</style>

</head>

<body>

<!-- ================= MOD

    <script>

//==========================
// CHỈ MỞ 1 MOD
//==========================

const banners = document.querySelectorAll(".toggle");

banners.forEach(function(banner){

banner.onclick=function(){

const content=this.parentElement.querySelector(".mod-content");

document.querySelectorAll(".mod-content").forEach(function(item){

if(item!==content){

item.style.display="none";

}

});

if(content.style.display=="block"){

content.style.display="none";

}else{

content.style.display="block";

content.scrollIntoView({
behavior:"smooth",
block:"start"
});

}

};

});

//==========================
// TÌM KIẾM
//==========================

const search=document.getElementById("search");

search.addEventListener("keyup",function(){

let value=this.value.toLowerCase();

document.querySelectorAll(".sub").forEach(function(card){

let text=card.innerText.toLowerCase();

if(text.indexOf(value)>-1){

card.style.display="block";

}else{

card.style.display="none";

}

});

});

//==========================
// HIỆU ỨNG MƯỢT
//==========================

document.querySelectorAll(".mod").forEach(function(card){

card.addEventListener("touchstart",function(){

this.style.transform="scale(.98)";

});

card.addEventListener("touchend",function(){

this.style.transform="scale(1)";

});

});

</script>
