<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#111317;
color:#fff;
}

.container{
max-width:500px;
margin:auto;
padding:18px;
}

.header{
text-align:center;
margin-top:20px;
}

.avatar{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
border:4px solid #00d5ff;
box-shadow:0 0 18px rgba(0,213,255,.5);
}

.header h1{
margin-top:15px;
font-size:30px;
}

.header p{
margin-top:6px;
font-size:15px;
color:#bdbdbd;
}


.notice{
margin-top:28px;
}

.notice h2{
font-size:22px;
margin-bottom:15px;
color:#00d5ff;
}


.slider{
display:flex;
gap:12px;
overflow-x:auto;
scroll-behavior:smooth;
padding-bottom:8px;
}

.slider::-webkit-scrollbar{
display:none;
}


.slide{
flex:0 0 220px;
}


.slide img{
width:100%;
aspect-ratio:16/9;
object-fit:cover;
border-radius:14px;
display:block;
box-shadow:0 5px 15px rgba(0,0,0,.35);
transition:.3s;
}


.slide img:hover{
transform:scale(1.03);
}

</style>

</head>


<body>


<div class="container">


<div class="header">

<img class="avatar"
src="https://sf-static.upanhlaylink.com/img/image_202607173d84c5337cf3400d46429c8195c2652a.jpg">

<h1>STUDIO MOD</h1>

<p>SHARE MOD SKIN ANTIBAND</p>

</div>



<div class="notice">

<h2>📢 MOD MỚI & THÔNG BÁO</h2>


<div class="slider">


<a class="slide" href="#">
<img src="https://sf-static.upanhlaylink.com/img/image_20260702ff35c82a08da85a67cbff9f00d243764.jpg">
</a>


<a class="slide" href="#">
<img src="https://sf-static.upanhlaylink.com/img/image_202607026c2ff1202e495609b5a73697b989193d.jpg">
</a>


<a class="slide" href="#">
<img src="https://sf-static.upanhlaylink.com/img/image_202607028f0c46366083c38cb88063252a9640bf.jpg">
</a>


</div>

</div>


</div>



<script>

const slider = document.querySelector(".slider");


function startSlide(){

return setInterval(()=>{

slider.scrollBy({

left:232,

behavior:"smooth"

});


if(
slider.scrollLeft + slider.clientWidth >= slider.scrollWidth - 5
){

setTimeout(()=>{

slider.scrollTo({

left:0,

behavior:"smooth"

});

},600);

}


},3000);

}



let autoSlide = startSlide();



slider.addEventListener("touchstart",()=>{

clearInterval(autoSlide);

});



slider.addEventListener("touchend",()=>{

autoSlide = startSlide();

});


</script>


</body>
