<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#111;
    color:#fff;
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
}

.header{
    text-align:center;
    margin-bottom:20px;
}

.avatar{
    width:100px;
    height:100px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid #00d4ff;
}

.name{
    font-size:28px;
    font-weight:bold;
    margin-top:10px;
}

.bio{
    color:#aaa;
    margin-top:5px;
}

.notice{
    background:#1c1c1c;
    border-radius:12px;
    padding:15px;
    margin-top:20px;
}

.notice h2{
    font-size:20px;
    margin-bottom:10px;
}

.notice p{
    margin:6px 0;
}

.search{
    margin:20px 0;
}

.search input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    font-size:16px;
}

.card{
    background:#1c1c1c;
    border-radius:12px;
    margin-bottom:15px;
    overflow:hidden;
}

.card summary{
    list-style:none;
    cursor:pointer;
    padding:15px;
    font-size:18px;
    font-weight:bold;
}

.card summary::-webkit-details-marker{
    display:none;
}

.item{
    display:flex;
    align-items:center;
    gap:12px;
    padding:12px 15px;
    color:#fff;
    text-decoration:none;
    border-top:1px solid #333;
}

.item:hover{
    background:#2a2a2a;
}

.item img{
    width:55px;
    height:55px;
    object-fit:cover;
    border-radius:10px;
}
</style>

</head>

    <script>
const search = document.getElementById("search");

search.addEventListener("keyup", function () {
    let value = this.value.toLowerCase();

    document.querySelectorAll(".item").forEach(function(item){
        let text = item.innerText.toLowerCase();

        if(text.indexOf(value) > -1){
            item.style.display = "flex";
        }else{
            item.style.display = "none";
        }
    });
});
</script>
